<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SETLIST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --surface2:  #1a1a1a;
      --border:    #222222;
      --text:      #e8e8e8;
      --dim:       #555555;
      --green:     #c8f53b;
      --amber:     #f5a623;
      --teal:      #2dd4bf;
      --red:       #dc2626;
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      z-index: 100;
    }
    #loading .logo { font-family: 'Bebas Neue'; font-size: 64px; letter-spacing: .06em; }
    #loading .sub  { font-size: 11px; color: var(--dim); letter-spacing: .12em; }

    /* ── SIGN-IN ── */
    #signin {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 32px; padding: 32px;
    }
    #signin .logo    { font-family: 'Bebas Neue'; font-size: 80px; letter-spacing: .06em; line-height: 1; }
    #signin .tagline { color: var(--dim); font-size: 12px; letter-spacing: .06em; text-align: center; }

    .btn-google {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-family: 'DM Mono'; font-size: 14px;
      padding: 13px 22px; cursor: pointer; transition: background .15s;
    }
    .btn-google:hover { background: #222; }

    /* ── APP SHELL ── */
    #app {
      display: none; flex-direction: column;
      height: 100vh; height: 100dvh;
      max-width: 600px; margin: 0 auto;
      position: relative;
    }

    /* Header */
    .hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .hdr-logo { font-family: 'Bebas Neue'; font-size: 34px; letter-spacing: .06em; line-height: 1; }
    .hdr-right { display: flex; align-items: center; gap: 10px; }
    .hdr-count { font-size: 11px; color: var(--dim); }
    .saving-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); opacity: 0; transition: opacity .2s;
    }
    .saving-dot.on { opacity: 1; }
    .btn-out {
      background: none; border: none; color: var(--dim);
      font-family: 'DM Mono'; font-size: 11px; cursor: pointer; padding: 2px;
    }
    .btn-out:hover { color: var(--text); }

    /* Tabs */
    .tabs {
      display: flex; gap: 20px; padding: 10px 16px 0;
      background: var(--bg); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: .06em;
      color: var(--dim); cursor: pointer; padding-bottom: 8px;
      border-bottom: 2px solid transparent; transition: color .15s, border-color .15s;
    }
    .tab.on { color: var(--text); border-bottom-color: var(--text); }

    /* Search */
    .search-wrap { padding: 10px 16px; flex-shrink: 0; }
    .search-input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text); font-family: 'DM Mono'; font-size: 13px;
      padding: 9px 12px; outline: none;
    }
    .search-input::placeholder { color: var(--dim); }
    .search-input:focus { border-color: #3a3a3a; }

    /* List */
    .list {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }

    /* Empty */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 24px; gap: 10px;
      color: var(--dim); font-size: 13px; text-align: center;
    }

    /* Row */
    .row-wrap { position: relative; overflow: hidden; }

    .del-reveal {
      position: absolute; right: 0; top: 0; bottom: 0;
      background: var(--red); color: #fff;
      display: flex; align-items: center; padding: 0 22px;
      font-size: 18px; opacity: 0; pointer-events: none;
    }

    .row {
      display: flex; align-items: center;
      padding: 12px 14px 12px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg); position: relative;
      transform: translateX(0); touch-action: pan-y; user-select: none;
    }
    .row::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    }
    .row.show::before     { background: var(--green); }
    .row.festival::before { background: var(--amber); }

    .row-body { flex: 1; min-width: 0; }
    .row-title {
      font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .row-sub {
      font-size: 11px; color: var(--dim); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .row-meta {
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 5px; margin-left: 12px; flex-shrink: 0;
    }
    .row-date { font-size: 11px; color: var(--dim); white-space: nowrap; }

    /* Pills */
    .pill {
      font-family: 'Bebas Neue'; font-size: 11px; letter-spacing: .08em;
      padding: 2px 7px; border-radius: 2px;
      cursor: pointer; transition: opacity .15s; white-space: nowrap; border: none;
    }
    .pill:active { opacity: .7; }
    .pill.planned  { background: var(--green); color: #000; }
    .pill.bought   { background: var(--teal);  color: #000; }
    .pill.attended { background: #2a2a2a;      color: var(--dim); }

    /* Delete btn (desktop hover) */
    .btn-del {
      background: none; border: none; color: var(--dim);
      cursor: pointer; font-size: 17px; line-height: 1;
      padding: 4px 2px; margin-left: 6px;
      opacity: 0; transition: opacity .15s, color .15s; flex-shrink: 0;
    }
    .row:hover .btn-del { opacity: 1; }
    .btn-del:hover { color: var(--red); }

    /* Stats bar */
    .stats {
      display: flex; justify-content: center; gap: 40px;
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      background: var(--surface); border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .stat-n { font-family: 'Bebas Neue'; font-size: 24px; letter-spacing: .04em; line-height: 1; }
    .stat-l { font-size: 9px; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; }

    /* FAB */
    .fab {
      position: absolute; bottom: calc(58px + env(safe-area-inset-bottom, 0px) + 16px);
      right: 18px; width: 50px; height: 50px;
      background: var(--green); border: none; border-radius: 50%;
      font-size: 26px; color: #000; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 18px rgba(200,245,59,.35);
      transition: transform .15s, box-shadow .15s; z-index: 5;
    }
    .fab:hover  { transform: scale(1.06); box-shadow: 0 6px 22px rgba(200,245,59,.45); }
    .fab:active { transform: scale(.95); }

    /* ── MODAL ── */
    .backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.72);
      z-index: 20; opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .backdrop.on { opacity: 1; pointer-events: auto; }

    .modal {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-width: 600px; margin: 0 auto;
      background: var(--surface); border-radius: 16px 16px 0 0;
      padding: 20px 20px calc(28px + env(safe-area-inset-bottom, 0px));
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,.72,0,1);
      z-index: 21; max-height: 92vh; overflow-y: auto;
    }
    .modal.on { transform: translateY(0); }

    .modal-handle {
      width: 36px; height: 4px; background: #2a2a2a;
      border-radius: 2px; margin: 0 auto 18px;
    }

    /* Type toggle */
    .type-toggle {
      display: flex; background: var(--surface2);
      border-radius: 6px; padding: 3px; margin-bottom: 18px;
    }
    .type-btn {
      flex: 1; font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: .08em;
      background: none; border: none; color: var(--dim);
      padding: 8px; border-radius: 4px; cursor: pointer; transition: all .15s;
    }
    .type-btn.on { background: var(--surface); color: var(--text); }

    /* Form */
    .fg { margin-bottom: 13px; position: relative; }
    .fl {
      display: block; font-size: 10px; letter-spacing: .12em;
      color: var(--dim); text-transform: uppercase; margin-bottom: 4px;
    }
    .fl span { color: #333; }
    .fi {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text); font-family: 'DM Mono'; font-size: 14px;
      padding: 10px 12px; outline: none; transition: border-color .15s;
    }
    .fi:focus { border-color: #3a3a3a; }
    .fi::placeholder { color: #333; }

    .date-row { display: flex; gap: 10px; }
    .date-row .fg { flex: 1; }

    /* Status buttons */
    .status-btns { display: flex; gap: 8px; }
    .s-btn {
      flex: 1; font-family: 'Bebas Neue'; font-size: 14px; letter-spacing: .06em;
      padding: 8px 4px; border: 1px solid var(--border); border-radius: 4px;
      background: none; color: var(--dim); cursor: pointer; text-align: center;
      transition: all .15s;
    }
    .s-btn.on-planned  { background: var(--green); color: #000; border-color: var(--green); }
    .s-btn.on-bought   { background: var(--teal);  color: #000; border-color: var(--teal); }
    .s-btn.on-attended { background: #2a2a2a;      color: #888; border-color: #2a2a2a; }

    /* Autocomplete dropdown */
    .ac-list {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; max-height: 200px; overflow-y: auto; display: none;
    }
    .ac-list.on { display: block; }
    .ac-item {
      padding: 10px 12px; cursor: pointer; font-size: 13px;
      border-bottom: 1px solid var(--border); transition: background .1s;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.hi { background: #222; }
    .ac-item .ac-sub { font-size: 11px; color: var(--dim); margin-top: 1px; }

    /* Add button */
    .btn-add {
      width: 100%; background: var(--green); border: none; border-radius: 4px;
      font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: .1em;
      color: #000; padding: 14px; cursor: pointer; margin-top: 6px;
      transition: opacity .15s;
    }
    .btn-add:active { opacity: .8; }

    /* Toast */
    .toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 13px;
      padding: 9px 16px; border-radius: 4px;
      opacity: 0; transition: all .2s; pointer-events: none; z-index: 99;
      white-space: nowrap;
    }
    .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="logo">SETLIST</div>
  <div class="sub">Loading…</div>
</div>

<!-- Sign-in -->
<div id="signin">
  <div class="logo">SETLIST</div>
  <div class="tagline">Your personal concert tracker.</div>
  <button class="btn-google" id="btn-signin">
    <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
      <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
      <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
      <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
      <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
    </svg>
    Sign in with Google
  </button>
</div>

<!-- App -->
<div id="app">
  <header class="hdr">
    <div class="hdr-logo">SETLIST</div>
    <div class="hdr-right">
      <div class="saving-dot" id="saving-dot"></div>
      <span class="hdr-count" id="hdr-count"></span>
      <button class="btn-out" id="btn-signout">sign out</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab on" data-tab="upcoming">Upcoming</div>
    <div class="tab"    data-tab="attended">Attended</div>
    <div class="tab"    data-tab="all">All</div>
  </div>

  <div class="search-wrap">
    <input id="search" class="search-input" type="search"
           placeholder="search artists, venues…" autocomplete="off" autocorrect="off">
  </div>

  <div class="list" id="list"></div>

  <footer class="stats">
    <div class="stat"><div class="stat-n" id="s-planned">0</div><div class="stat-l">Planned</div></div>
    <div class="stat"><div class="stat-n" id="s-bought">0</div><div class="stat-l">Ticket</div></div>
    <div class="stat"><div class="stat-n" id="s-attended">0</div><div class="stat-l">Attended</div></div>
  </footer>

  <button class="fab" id="fab" aria-label="Add show">+</button>
</div>

<!-- Modal backdrop -->
<div class="backdrop" id="backdrop"></div>

<!-- Modal -->
<div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Add entry">
  <div class="modal-handle"></div>

  <div class="type-toggle">
    <button class="type-btn on" data-type="show">Show</button>
    <button class="type-btn"   data-type="festival">Festival</button>
  </div>

  <!-- Show-only fields -->
  <div id="show-fields">
    <div class="fg" id="artist-fg">
      <label class="fl" for="artist-in">Artist</label>
      <input class="fi" id="artist-in" placeholder="Search artist…" autocomplete="off">
      <div class="ac-list" id="artist-ac"></div>
    </div>
    <div class="fg">
      <label class="fl" for="tour-in">Tour / Event <span>(optional)</span></label>
      <input class="fi" id="tour-in" placeholder="e.g. The Black Parade Tour">
    </div>
  </div>

  <!-- Festival-only fields -->
  <div id="fest-fields" style="display:none">
    <div class="fg">
      <label class="fl" for="fest-in">Festival name</label>
      <input class="fi" id="fest-in" placeholder="e.g. Glastonbury 2025">
    </div>
  </div>

  <!-- Shared: Venue + City -->
  <div class="fg" id="venue-fg">
    <label class="fl" for="venue-in">Venue</label>
    <input class="fi" id="venue-in" placeholder="Search venue…" autocomplete="off">
    <div class="ac-list" id="venue-ac"></div>
  </div>
  <div class="fg" id="city-fg">
    <label class="fl" for="city-in">City <span>(auto-filled)</span></label>
    <input class="fi" id="city-in" placeholder="e.g. San Francisco, CA">
  </div>

  <!-- Date: show -->
  <div class="fg" id="date-show-fg">
    <label class="fl" for="date-in">Date</label>
    <input class="fi" id="date-in" type="date">
  </div>

  <!-- Date: festival -->
  <div id="date-fest-fg" style="display:none">
    <div class="date-row">
      <div class="fg">
        <label class="fl" for="date-from-in">From</label>
        <input class="fi" id="date-from-in" type="date">
      </div>
      <div class="fg">
        <label class="fl" for="date-to-in">To <span>(optional)</span></label>
        <input class="fi" id="date-to-in" type="date">
      </div>
    </div>
  </div>

  <!-- Status -->
  <div class="fg">
    <label class="fl">Status</label>
    <div class="status-btns">
      <button class="s-btn on-planned" data-status="planned">Planned</button>
      <button class="s-btn"           data-status="bought">Ticket ✓</button>
      <button class="s-btn"           data-status="attended">Attended</button>
    </div>
  </div>

  <button class="btn-add" id="btn-add">Add</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ── CONFIG ─────────────────────────────────────── */
const CLIENT_ID      = '142418659339-2qj69s19a0pqlc56i8jihb5hi9p486d6.apps.googleusercontent.com';
const PLACES_API_KEY = 'AIzaSyBI8_mTRMkMXw3n1rlWJzSjUB6Ps8TefEA';
const FILE_NAME      = 'setlist-data.json';
const DRIVE_SCOPE    = 'https://www.googleapis.com/auth/drive';

/* ── STATE ───────────────────────────────────────── */
let setlist      = [];
let fileId       = null;
let token        = null;
let tokenExpiry  = 0;
let currentTab   = 'upcoming';
let query        = '';
let saveTimer    = null;
let modalType    = 'show';
let modalStatus  = 'planned';
let storedCity   = '';
let storedCountry = '';
let placesAC     = null;   // google.maps.places.AutocompleteService
let placesDs     = null;   // google.maps.places.PlacesService
let placesToken  = null;   // AutocompleteSessionToken
let mbTimer      = null;
let tokenClient;

/* ── UTILS ───────────────────────────────────────── */
const $ = id => document.getElementById(id);

function today() { return new Date().toISOString().slice(0, 10); }

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(s) {
  if (!s) return '';
  const [y, m, d] = s.split('-');
  return `${MONTHS[+m-1]} ${+d}, ${y}`;
}
function fmtRange(from, to) {
  if (!to || from === to) return fmtDate(from);
  const [y1,m1,d1] = from.split('-'), [y2,m2,d2] = to.split('-');
  if (m1===m2 && y1===y2) return `${MONTHS[+m1-1]} ${+d1}–${+d2}, ${y1}`;
  return `${fmtDate(from)} – ${fmtDate(to)}`;
}

function cap(s) {
  if (!s) return '';
  return s.replace(/\b\w/g, c => c.toUpperCase());
}
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg, ms = 2200) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('on'), ms);
}

function setSaving(v) { $('saving-dot').classList.toggle('on', v); }

/* ── AUTH ────────────────────────────────────────── */
function initAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: onToken,
    prompt: '',
  });

  const stored = _loadStoredToken();
  if (stored) {
    token = stored.access_token;
    tokenExpiry = stored.expires_at;
    showApp();
    loadDrive();
  } else {
    showSignIn();
  }
}

function _loadStoredToken() {
  try {
    const raw = localStorage.getItem('sl_token');
    if (!raw) return null;
    const p = JSON.parse(raw);
    if (p.expires_at > Date.now() + 30000) return p;
  } catch (_) {}
  return null;
}

function onToken(resp) {
  if (resp.error) { console.warn('Auth error', resp.error); showSignIn(); return; }
  token = resp.access_token;
  tokenExpiry = Date.now() + (resp.expires_in - 60) * 1000;
  localStorage.setItem('sl_token', JSON.stringify({ access_token: token, expires_at: tokenExpiry }));
  showApp();
  loadDrive();
}

function signIn() { tokenClient.requestAccessToken({ prompt: 'select_account' }); }

function signOut() {
  if (token) google.accounts.oauth2.revoke(token, () => {});
  token = null; tokenExpiry = 0; fileId = null; setlist = [];
  localStorage.removeItem('sl_token');
  $('app').style.display = 'none';
  showSignIn();
}

/* ── DRIVE ───────────────────────────────────────── */
async function driveReq(method, url, body, ct) {
  const h = { Authorization: `Bearer ${token}` };
  if (ct) h['Content-Type'] = ct;
  const r = await fetch(url, { method, headers: h, body });
  if (r.status === 401) { localStorage.removeItem('sl_token'); showSignIn(); throw new Error('401'); }
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r;
}

function multipart(meta, content) {
  const b = 'SL_BOUNDARY_7f3e9a1b';
  const body =
    `--${b}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(meta)}\r\n` +
    `--${b}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${b}--`;
  return { body, ct: `multipart/related; boundary="${b}"` };
}

async function findOrCreate() {
  const q = encodeURIComponent(`name='${FILE_NAME}' and trashed=false`);
  const r = await driveReq('GET',
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`, null, null);
  const d = await r.json();
  if (d.files?.length) { fileId = d.files[0].id; return true; }

  const { body, ct } = multipart({ name: FILE_NAME, mimeType: 'application/json' }, '[]');
  const cr = await driveReq('POST',
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
    body, ct);
  const cd = await cr.json();
  fileId = cd.id;
  return false;
}

async function loadDrive() {
  $('loading').style.display = 'flex';
  try {
    const exists = await findOrCreate();
    if (exists) {
      const r = await driveReq('GET',
        `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, null, null);
      const d = await r.json();
      setlist = Array.isArray(d) ? d : [];
    } else {
      setlist = [];
    }
    render();
  } catch (e) {
    if (e.message !== '401') toast('Failed to load data from Drive.');
  } finally {
    $('loading').style.display = 'none';
  }
}

async function saveDrive() {
  if (!fileId || !token) return;
  setSaving(true);
  try {
    const content = JSON.stringify(setlist, null, 2);
    const { body, ct } = multipart({ name: FILE_NAME }, content);
    await driveReq('PATCH',
      `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`,
      body, ct);
  } catch (e) {
    if (e.message !== '401') toast('Save failed — check your connection.');
  } finally {
    setSaving(false);
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveDrive, 1000);
}

/* ── FILTER ──────────────────────────────────────── */
function filtered() {
  const t = today();
  let items = [...setlist];

  if (query) {
    const q = query.toLowerCase();
    items = items.filter(e =>
      [e.artist, e.festival, e.venue, e.city, e.tour]
        .filter(Boolean).some(f => f.toLowerCase().includes(q))
    );
  }

  if (currentTab === 'upcoming') {
    items = items.filter(e => e.date >= t && (e.status === 'planned' || e.status === 'bought'));
    items.sort((a, b) => a.date.localeCompare(b.date));
  } else if (currentTab === 'attended') {
    items = items.filter(e => e.status === 'attended');
    items.sort((a, b) => b.date.localeCompare(a.date));
  } else {
    items.sort((a, b) => b.date.localeCompare(a.date));
  }

  return items;
}

/* ── RENDER ──────────────────────────────────────── */
function render() {
  const planned  = setlist.filter(e => e.status === 'planned').length;
  const bought   = setlist.filter(e => e.status === 'bought').length;
  const attended = setlist.filter(e => e.status === 'attended').length;
  $('s-planned').textContent  = planned;
  $('s-bought').textContent   = bought;
  $('s-attended').textContent = attended;
  $('hdr-count').textContent  = `${setlist.length} shows`;

  const items = filtered();
  const list  = $('list');

  if (!items.length) {
    const msgs = {
      upcoming: 'No upcoming shows.',
      attended: 'No attended shows yet.',
      all: setlist.length ? 'No results.' : 'Nothing here yet. Tap + to add a show.',
    };
    list.innerHTML = `<div class="empty">${msgs[currentTab]}</div>`;
    return;
  }

  list.innerHTML = items.map(rowHTML).join('');

  list.querySelectorAll('.pill').forEach(el =>
    el.addEventListener('click', ev => { ev.stopPropagation(); cycleStatus(el.dataset.id); })
  );
  list.querySelectorAll('.btn-del').forEach(el =>
    el.addEventListener('click', ev => { ev.stopPropagation(); deleteEntry(el.dataset.id); })
  );
  list.querySelectorAll('.row').forEach(initSwipe);
}

function rowHTML(e) {
  const isShow  = e.type === 'show';
  const title   = isShow ? cap(e.artist) : e.festival;
  const sub     = [e.venue, e.city].filter(Boolean).join(' · ');
  const dateStr = isShow ? fmtDate(e.date) : fmtRange(e.date, e.dateEnd);
  const pillLbl = e.status === 'bought' ? 'Ticket ✓' : cap(e.status);

  return `
<div class="row-wrap">
  <div class="del-reveal" id="dr-${e.id}">×</div>
  <div class="row ${esc(e.type)}" data-id="${esc(e.id)}">
    <div class="row-body">
      <div class="row-title">${esc(title)}</div>
      ${sub ? `<div class="row-sub">${esc(sub)}</div>` : ''}
    </div>
    <div class="row-meta">
      <div class="row-date">${esc(dateStr)}</div>
      <button class="pill ${esc(e.status)}" data-id="${esc(e.id)}">${pillLbl}</button>
    </div>
    <button class="btn-del" data-id="${esc(e.id)}" aria-label="Delete">×</button>
  </div>
</div>`;
}

/* ── SWIPE TO DELETE ──────────────────────────────── */
function initSwipe(row) {
  let sx = 0, dx = 0, active = false;
  const id  = row.dataset.id;
  const rev = $('dr-' + id);
  const THRESH = 80;

  row.addEventListener('touchstart', e => {
    sx = e.touches[0].clientX; active = true;
    row.style.transition = 'none';
  }, { passive: true });

  row.addEventListener('touchmove', e => {
    if (!active) return;
    dx = e.touches[0].clientX - sx;
    if (dx < 0) {
      row.style.transform = `translateX(${dx}px)`;
      if (rev) rev.style.opacity = Math.min(1, Math.abs(dx) / THRESH);
    }
  }, { passive: true });

  row.addEventListener('touchend', () => {
    if (!active) return; active = false;
    row.style.transition = 'transform .2s';
    if (dx < -THRESH) {
      row.style.transform = 'translateX(-100%)';
      setTimeout(() => deleteEntry(id), 200);
    } else {
      row.style.transform = 'translateX(0)';
      if (rev) rev.style.opacity = 0;
    }
    dx = 0;
  });
}

/* ── ACTIONS ─────────────────────────────────────── */
function cycleStatus(id) {
  const e = setlist.find(x => x.id === id);
  if (!e) return;
  const cycle = ['planned', 'bought', 'attended'];
  e.status = cycle[(cycle.indexOf(e.status) + 1) % cycle.length];
  render(); scheduleSave();
}

function deleteEntry(id) {
  setlist = setlist.filter(e => e.id !== id);
  render(); scheduleSave();
}

function addEntry(e) {
  setlist.push(e); render(); scheduleSave();
}

/* ── MODAL ───────────────────────────────────────── */
function openModal() {
  resetModal();
  $('backdrop').classList.add('on');
  $('modal').classList.add('on');
  setTimeout(() => {
    (modalType === 'show' ? $('artist-in') : $('fest-in')).focus();
  }, 320);
}

function closeModal() {
  $('backdrop').classList.remove('on');
  $('modal').classList.remove('on');
  closeAC('artist-ac');
  closeAC('venue-ac');
}

function resetModal() {
  ['artist-in','tour-in','fest-in','venue-in','city-in','date-in','date-from-in','date-to-in']
    .forEach(id => { $( id).value = ''; });
  storedCity = ''; storedCountry = '';
  setModalStatus('planned');
  setModalType('show');
  closeAC('artist-ac'); closeAC('venue-ac');
  if (placesToken) placesToken = new google.maps.places.AutocompleteSessionToken();
}

function setModalType(type) {
  modalType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('on', b.dataset.type === type));
  $('show-fields').style.display      = type === 'show' ? '' : 'none';
  $('fest-fields').style.display      = type === 'festival' ? '' : 'none';
  $('date-show-fg').style.display     = type === 'show' ? '' : 'none';
  $('date-fest-fg').style.display     = type === 'festival' ? '' : 'none';
}

function setModalStatus(s) {
  modalStatus = s;
  document.querySelectorAll('.s-btn').forEach(b => {
    b.className = 's-btn';
    if (b.dataset.status === s) b.classList.add(`on-${s}`);
  });
}

function submitModal() {
  const venue = $('venue-in').value.trim();
  const city  = $('city-in').value.trim() || storedCity;
  const id    = Date.now().toString();

  if (modalType === 'show') {
    const artist = $('artist-in').value.trim();
    const date   = $('date-in').value;
    if (!artist) { toast('Artist is required.'); $('artist-in').focus(); return; }
    if (!date)   { toast('Date is required.'); $('date-in').focus(); return; }
    const tour = $('tour-in').value.trim();
    addEntry({
      id, type: 'show',
      artist: artist.toLowerCase(),
      ...(tour ? { tour } : {}),
      ...(venue ? { venue } : {}),
      ...(city ? { city } : {}),
      ...(storedCountry ? { country: storedCountry } : {}),
      date, status: modalStatus, source: 'manual'
    });
  } else {
    const festival = $('fest-in').value.trim();
    const dateFrom = $('date-from-in').value;
    if (!festival) { toast('Festival name is required.'); $('fest-in').focus(); return; }
    if (!dateFrom) { toast('Start date is required.'); $('date-from-in').focus(); return; }
    const dateTo = $('date-to-in').value;
    addEntry({
      id, type: 'festival', festival,
      ...(venue ? { venue } : {}),
      ...(city ? { city } : {}),
      ...(storedCountry ? { country: storedCountry } : {}),
      date: dateFrom,
      ...(dateTo ? { dateEnd: dateTo } : {}),
      status: modalStatus, source: 'manual'
    });
  }

  closeModal();
}

/* ── AUTOCOMPLETE HELPERS ────────────────────────── */
function showAC(acId, items, onSelect) {
  const ac = $(acId);
  if (!items.length) { ac.classList.remove('on'); return; }
  ac.innerHTML = items.map((it, i) => `
    <div class="ac-item" data-i="${i}">
      <div>${esc(it.primary)}</div>
      ${it.secondary ? `<div class="ac-sub">${esc(it.secondary)}</div>` : ''}
    </div>`).join('');
  ac.classList.add('on');
  ac.querySelectorAll('.ac-item').forEach((el, i) =>
    el.addEventListener('mousedown', ev => {
      ev.preventDefault();
      onSelect(items[i]);
      ac.classList.remove('on');
    })
  );
}
function closeAC(id) { $(id)?.classList.remove('on'); }

/* ── MUSICBRAINZ ─────────────────────────────────── */
async function searchArtists(q) {
  if (q.length < 2) { closeAC('artist-ac'); return; }
  clearTimeout(mbTimer);
  mbTimer = setTimeout(async () => {
    try {
      const url = `https://musicbrainz.org/ws/2/artist/?query=${encodeURIComponent(q)}&fmt=json&limit=6`;
      const r = await fetch(url, { headers: { 'User-Agent': 'Setlist/1.0 (rhine1217@gmail.com)' } });
      const d = await r.json();
      showAC('artist-ac', (d.artists || []).slice(0, 6).map(a => ({
        primary: a.name,
        secondary: [a.disambiguation, a['begin-area']?.name].filter(Boolean).join(' · '),
        value: a.name,
      })), item => {
        $('artist-in').value = item.value;
        $('tour-in').focus();
      });
    } catch (_) {}
  }, 280);
}

/* ── GOOGLE PLACES ───────────────────────────────── */
function initPlaces() {
  placesToken = new google.maps.places.AutocompleteSessionToken();
  placesAC    = new google.maps.places.AutocompleteService();
  placesDs    = new google.maps.places.PlacesService(document.createElement('div'));
}

function searchVenues(q) {
  if (q.length < 2) { closeAC('venue-ac'); return; }
  if (!placesAC) { closeAC('venue-ac'); return; }

  placesAC.getPlacePredictions(
    { input: q, types: ['establishment'], sessionToken: placesToken },
    (preds, status) => {
      if (status !== google.maps.places.PlacesServiceStatus.OK || !preds) {
        closeAC('venue-ac'); return;
      }
      showAC('venue-ac', preds.map(p => ({
        primary:   p.structured_formatting.main_text,
        secondary: p.structured_formatting.secondary_text,
        value:     p.structured_formatting.main_text,
        placeId:   p.place_id,
      })), item => {
        $('venue-in').value = item.value;
        if (item.placeId) fillPlace(item.placeId);
        const next = modalType === 'show' ? $('date-in') : $('date-from-in');
        next?.focus();
      });
    }
  );
}

function fillPlace(placeId) {
  if (!placesDs) return;
  placesDs.getDetails(
    { placeId, fields: ['address_components'] },
    (place, status) => {
      if (status !== google.maps.places.PlacesServiceStatus.OK) return;
      let city = '', state = '', country = '';
      for (const c of place.address_components || []) {
        if (c.types.includes('locality'))                     city    = c.long_name;
        if (c.types.includes('administrative_area_level_1'))  state   = c.short_name;
        if (c.types.includes('country'))                      country = c.long_name;
      }
      const cityStr = city ? (state ? `${city}, ${state}` : city) : state;
      $('city-in').value = cityStr;
      storedCity    = cityStr;
      storedCountry = country;
      if (placesToken) placesToken = new google.maps.places.AutocompleteSessionToken();
    }
  );
}

/* ── SHOW / HIDE SCREENS ─────────────────────────── */
function showSignIn() {
  $('loading').style.display    = 'none';
  $('signin').style.display     = 'flex';
  $('app').style.display        = 'none';
}
function showApp() {
  $('loading').style.display    = 'none';
  $('signin').style.display     = 'none';
  $('app').style.display        = 'flex';
}

/* ── EVENT LISTENERS ─────────────────────────────── */
$('btn-signin').addEventListener('click', signIn);
$('btn-signout').addEventListener('click', signOut);
$('fab').addEventListener('click', openModal);
$('backdrop').addEventListener('click', closeModal);
$('btn-add').addEventListener('click', submitModal);

document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => {
    currentTab = t.dataset.tab;
    document.querySelectorAll('.tab').forEach(x => x.classList.toggle('on', x === t));
    render();
  })
);

$('search').addEventListener('input', e => { query = e.target.value; render(); });

document.querySelectorAll('.type-btn').forEach(b =>
  b.addEventListener('click', () => setModalType(b.dataset.type))
);

document.querySelectorAll('.s-btn').forEach(b =>
  b.addEventListener('click', () => setModalStatus(b.dataset.status))
);

$('artist-in').addEventListener('input', e => searchArtists(e.target.value));
$('artist-in').addEventListener('blur',  () => setTimeout(() => closeAC('artist-ac'), 160));

$('venue-in').addEventListener('input', e => searchVenues(e.target.value));
$('venue-in').addEventListener('blur',  () => setTimeout(() => closeAC('venue-ac'), 160));

// Enter-key navigation through modal fields
const FIELDS = {
  show:     ['artist-in', 'tour-in', 'venue-in', 'city-in', 'date-in'],
  festival: ['fest-in', 'venue-in', 'city-in', 'date-from-in', 'date-to-in'],
};
$('modal').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const fields = FIELDS[modalType];
  const idx    = fields.indexOf(document.activeElement?.id);
  if (idx === -1) return;
  e.preventDefault();
  if (idx < fields.length - 1) $(`${fields[idx + 1]}`).focus();
  else submitModal();
});

/* ── INIT ────────────────────────────────────────── */
function initGIS() {
  // google.accounts is now available
  initAuth();
}

// Load Google Identity Services
const gisScript = document.createElement('script');
gisScript.src   = 'https://accounts.google.com/gsi/client';
gisScript.onload = initGIS;
gisScript.onerror = () => toast('Failed to load Google auth. Check your connection.');
document.head.appendChild(gisScript);

// Load Google Maps / Places if key is configured
if (PLACES_API_KEY && PLACES_API_KEY !== 'YOUR_PLACES_API_KEY') {
  window.initPlaces = initPlaces;
  const mapsScript  = document.createElement('script');
  mapsScript.src    = `https://maps.googleapis.com/maps/api/js?key=${PLACES_API_KEY}&libraries=places&callback=initPlaces`;
  mapsScript.async  = true;
  mapsScript.onerror = () => console.warn('Places API failed to load — venue autocomplete unavailable.');
  document.head.appendChild(mapsScript);
}
</script>
